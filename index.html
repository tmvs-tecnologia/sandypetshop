      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Poppins:wght@400;500;600;700&family=Rochester&family=Lobster+Two:wght@700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&display=swap');
      
      /* Barra de rolagem (scrollbar) elegante e premium do sistema */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(219, 39, 119, 0.22); /* Rosa suave translúcido combinando com a cor de destaque #DB2777 */
        border-radius: 9999px;
        border: 1px solid transparent;
        background-clip: padding-box;
        transition: background-color 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(219, 39, 119, 0.48); /* Rosa mais nítido ao passar o mouse */
        border-radius: 9999px;
      }

      /* Customizações temáticas para seções específicas */
      .scrollbar-purple::-webkit-scrollbar-thumb {
        background: rgba(139, 92, 246, 0.25); /* Roxo translúcido */
      }

        background: rgba(139, 92, 246, 0.5);
      }

      .scrollbar-amber::-webkit-scrollbar-thumb {

      /* Estilização para o Firefox */

      body {

      }

      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translate3d(0, 30px, 0);
        }
        to {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }
      }

      @keyframes slideInFromRight {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideOutToLeft {
        from {
          opacity: 1;
          transform: translateX(0);
        }
        to {
          opacity: 0;
          transform: translateX(-30px);
        }
      }
      
      @keyframes scaleIn {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
      .animate-fadeInUp { animation: fadeInUp 0.6s ease-out forwards; }
      .animate-scaleIn { animation: scaleIn 0.5s ease-out forwards; }
      .animate-slideInFromRight { animation: slideInFromRight 0.5s ease-out forwards; }
      .animate-slideOutToLeft { animation: slideOutToLeft 0.5s ease-out forwards; }
      
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes spinSlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      .animate-slideIn { animation: slideIn 0.5s ease-out forwards; }
      .animate-spin-slow { animation: spinSlow 3s linear infinite; }
      .animate-blob { animation: blob 7s infinite; }
      .animate-float { animation: float 3s ease-in-out infinite; }
      .animation-delay-2000 { animation-delay: 2s; }
      .animation-delay-4000 { animation-delay: 4s; }
      
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .animate-slideUp { animation: slideUp 0.6s ease-out forwards; }
      
      @keyframes bloom {
        from { opacity: 0; transform: scale(0.9) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      
      .animate-bloom { animation: bloom 0.6s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
      
      /* ==========================================
         ADMIN DARK MODE VARIABLES & OVERRIDES
         ========================================== */
      :root {
        --admin-bg-primary: #f8fafc;
        --admin-bg-secondary: #f1f5f9;
        --admin-bg-card: #ffffff;
        --admin-bg-hover: #f1f5f9;
        --admin-border-color: #e2e8f0;
        --admin-text-primary: #0f172a;
        --admin-text-secondary: #475569;
        --admin-text-disabled: #94a3b8;
        --admin-color-brand: #ec4899;
      }

      /* Quando a classe .dark estiver presente no painel admin */
      .dark,
      [data-theme="dark"],
      .admin-dashboard-container.dark {
        --admin-bg-primary: #0f172a;
        --admin-bg-secondary: #111827;
        --admin-bg-card: #1e293b;
        --admin-bg-hover: #334155;
        --admin-border-color: #475569;
        --admin-text-primary: #f8fafc;
        --admin-text-secondary: #cbd5e1;
        --admin-text-disabled: #94a3b8;
        --admin-color-brand: #ec4899;
      }

      /* Suporte a transições globais suaves no painel administrativo */
      .admin-dashboard-container,
      .admin-dashboard-container * {
        transition: background-color 0.25s ease,
                    color 0.25s ease,
                    border-color 0.25s ease,
                    box-shadow 0.25s ease;
      }

      /* Sobrescritas para forçar o tema escuro em elementos com classes utilitárias padrões */
      .dark .admin-bg-primary-override,
      .admin-dashboard-container.dark .admin-bg-primary-override,
      [data-theme="dark"] .admin-bg-primary-override {
        background-color: var(--admin-bg-primary) !important;
        background-image: none !important;
      }
      .dark .admin-bg-secondary-override,
      .admin-dashboard-container.dark .admin-bg-secondary-override,
      [data-theme="dark"] .admin-bg-secondary-override {
        background-color: var(--admin-bg-secondary) !important;
        background-image: none !important;
      }
      .dark .admin-bg-card-override,
      .admin-dashboard-container.dark .admin-bg-card-override,
      [data-theme="dark"] .admin-bg-card-override {
        background-color: var(--admin-bg-card) !important;
        background-image: none !important;
      }
      .dark .admin-border-override,
      .admin-dashboard-container.dark .admin-border-override,
      [data-theme="dark"] .admin-border-override {
        border-color: var(--admin-border-color) !important;
      }
      .dark .admin-text-primary-override,
      .admin-dashboard-container.dark .admin-text-primary-override,
      [data-theme="dark"] .admin-text-primary-override {
        color: var(--admin-text-primary) !important;
      }
      .dark .admin-text-secondary-override,
      .admin-dashboard-container.dark .admin-text-secondary-override,
      [data-theme="dark"] .admin-text-secondary-override {
        color: var(--admin-text-secondary) !important;
      }

      /* Sobrescrita de classes Tailwind padrão sob o escopo .dark */
      .dark .bg-white,
      .admin-dashboard-container.dark .bg-white,
      [data-theme="dark"] .bg-white,
      .dark section.bg-white,
      .admin-dashboard-container.dark section.bg-white {
        background-color: var(--admin-bg-card) !important;
      }
      .dark .bg-gray-50,
      .admin-dashboard-container.dark .bg-gray-50,
      [data-theme="dark"] .bg-gray-50,
      .dark .bg-slate-50,
      .admin-dashboard-container.dark .bg-slate-50 {

      /* Divisórias e Bordas */
      .dark .border-gray-100, .admin-dashboard-container.dark .border-gray-100,

      .dark .border-b-2, .admin-dashboard-container.dark .border-b-2 {
        border-bottom-color: var(--admin-border-color) !important;
      }
      
      /* Inputs e Fichas */
      .dark input,
      .admin-dashboard-container.dark input,
      .dark select,
      .admin-dashboard-container.dark select,
      .dark textarea,
      .admin-dashboard-container.dark textarea {
        background-color: var(--admin-bg-secondary) !important;
        color: var(--admin-text-primary) !important;
        border-color: var(--admin-border-color) !important;
      }
      .dark input::placeholder,
      .admin-dashboard-container.dark input::placeholder,
      .dark textarea::placeholder,
      .admin-dashboard-container.dark textarea::placeholder {
        color: var(--admin-text-disabled) !important;
      }
      .dark input:focus, .admin-dashboard-container.dark input:focus,
      .dark select:focus, .admin-dashboard-container.dark select:focus,
      .dark textarea:focus, .admin-dashboard-container.dark textarea:focus {
        border-color: var(--admin-color-brand) !important;
        box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.2) !important;
      }
      .dark input:disabled, .admin-dashboard-container.dark input:disabled,
      .dark select:disabled, .admin-dashboard-container.dark select:disabled,
      .dark textarea:disabled, .admin-dashboard-container.dark textarea:disabled {
        background-color: var(--admin-bg-primary) !important;
        color: var(--admin-text-disabled) !important;
        opacity: 0.6;
      }
      .dark input[type="date"]::-webkit-calendar-picker-indicator,
      .admin-dashboard-container.dark input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
      }
      
      /* Scrollbar Custom para Dark Mode */
      .dark ::-webkit-scrollbar-thumb,
      .admin-dashboard-container.dark ::-webkit-scrollbar-thumb {
        background: rgba(236, 72, 153, 0.3) !important;

      .dark ::-webkit-scrollbar-thumb:hover,
