<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#DB2777" />
    <link rel="apple-touch-icon" href="https://i.imgur.com/M3Gt3OA.png" />
    <title>Sandy's Pet Shop - Agendamento</title>
    <meta name="description" content="Agende de forma rápida e prática o banho e tosa do seu pet na Sandy's Pet Shop!" />

    <!-- Open Graph / Facebook / Instagram -->

    <meta property="og:url" content="https://agendamento-sandypetshop.vercel.app/" />
    <meta property="og:title" content="Sandy's Pet Shop - Agendamento" />
    <meta property="og:description" content="Agende de forma rápida e prática o banho e tosa do seu pet na Sandy's Pet Shop!" />
    <meta property="og:image" content="https://agendamento-sandypetshop.vercel.app/bemvindo.jpeg" />
    <meta property="og:image:secure_url" content="https://agendamento-sandypetshop.vercel.app/bemvindo.jpeg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://agendamento-sandypetshop.vercel.app/" />
    <meta name="twitter:title" content="Sandy's Pet Shop - Agendamento" />
    <meta name="twitter:description" content="Agende de forma rápida e prática o banho e tosa do seu pet na Sandy's Pet Shop!" />
    <meta name="twitter:image" content="https://agendamento-sandypetshop.vercel.app/bemvindo.jpeg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Poppins:wght@400;500;600;700&family=Rochester&family=Lobster+Two:wght@700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&display=swap');
      
      /* Barra de rolagem (scrollbar) elegante e premium do sistema */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(219, 39, 119, 0.22); /* Rosa suave translúcido combinando com a cor de destaque #DB2777 */
        border-radius: 9999px;
        border: 1px solid transparent;
        background-clip: padding-box;
        transition: background-color 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(219, 39, 119, 0.48); /* Rosa mais nítido ao passar o mouse */
        border-radius: 9999px;
      }

      /* Customizações temáticas para seções específicas */
      .scrollbar-purple::-webkit-scrollbar-thumb {
        background: rgba(139, 92, 246, 0.25); /* Roxo translúcido */
      }
      .scrollbar-purple::-webkit-scrollbar-thumb:hover {
        background: rgba(139, 92, 246, 0.5);
      }

      .scrollbar-amber::-webkit-scrollbar-thumb {
        background: rgba(245, 158, 11, 0.25); /* Âmbar translúcido */
      }
      .scrollbar-amber::-webkit-scrollbar-thumb:hover {
        background: rgba(245, 158, 11, 0.5);
      }

      /* Estilização para o Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(219, 39, 119, 0.22) transparent;
      }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-family: 'Poppins', sans-serif;
        background-color: #FFF5F7; /* Baby Pink Background */
        touch-action: pan-x pan-y; /* Disable double-tap zoom but allow scrolling */
      }

      .font-brand {
        font-family: 'Rochester', cursive;
      }
      
      .font-inter {
        font-family: 'Inter', sans-serif;
      }

      .font-outfit {
        font-family: 'Outfit', sans-serif;
      }

      .font-jakarta {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      
      .font-rubik {
        font-family: 'Rubik', sans-serif;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translate3d(0, 30px, 0);
        }
        to {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }
      }

      @keyframes slideInFromRight {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideOutToLeft {
        from {
          opacity: 1;
          transform: translateX(0);
        }
        to {
          opacity: 0;
          transform: translateX(-30px);
        }
      }
      
      @keyframes scaleIn {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
      .animate-fadeInUp { animation: fadeInUp 0.6s ease-out forwards; }
      .animate-scaleIn { animation: scaleIn 0.5s ease-out forwards; }
      .animate-slideInFromRight { animation: slideInFromRight 0.5s ease-out forwards; }
      .animate-slideOutToLeft { animation: slideOutToLeft 0.5s ease-out forwards; }
      
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes spinSlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      .animate-slideIn { animation: slideIn 0.5s ease-out forwards; }
      .animate-spin-slow { animation: spinSlow 3s linear infinite; }
      .animate-blob { animation: blob 7s infinite; }
      .animate-float { animation: float 3s ease-in-out infinite; }
      .animation-delay-2000 { animation-delay: 2s; }
      .animation-delay-4000 { animation-delay: 4s; }
      
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .animate-slideUp { animation: slideUp 0.6s ease-out forwards; }
      
      @keyframes bloom {
        from { opacity: 0; transform: scale(0.9) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      
      .animate-bloom { animation: bloom 0.6s cubic-bezier(0.22, 1, 0.36, 1) backwards; }
    </style>

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
